<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ColorCraft Paints - Login</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #e6f4ff, #cce7ff, #b3dbff);
      }

      /* Card */
      .container {
        width: 360px;
        background: white;
        padding: 40px 30px;
        border-radius: 18px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #1e3a5f;
      }

      /* Inputs */
      .input-group {
        margin-bottom: 18px;
      }

      .input-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #cce7ff;
        border-radius: 10px;
        outline: none;
      }

      /* Button */
      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 25px;
        background: linear-gradient(45deg, #4da6ff, #1e90ff);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(30, 144, 255, 0.3);
      }

      /* Footer */
      .footer {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
      }

      .footer a {
        color: #1e90ff;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Dumax Trading Company Login</h2>

      <div class="input-group">
        <input type="email" placeholder="Email" />
      </div>

      <div class="input-group">
        <input type="password" placeholder="Password" />
      </div>

      <a href="index.html">
        <button>Login</button>
      </a>

      <div class="footer">
        Don't have an account? <a href="registration page.html">Register</a>
      </div>
    </div>
  </body>
</html>
