    <!-- Color Visualizer Section -->
    <section id="visualizer" class="section visualizer">
      <div class="visualizer-content">
        <div class="section-header fade-in">
          <h2>Interactive Color Visualizer</h2>
          <p>See how different colors transform your space</p>
        </div>
        <div class="visualizer-box fade-in">
          <div class="room-preview">
            <div class="color-overlay" id="colorOverlay"></div>
          </div>
          <div class="color-selector">
            <div
              class="color-option active"
              style="background: #2c5f7f"
              data-color="rgba(44, 95, 127, 0.3)"
              title="Ocean Blue"
            ></div>
            <div
              class="color-option"
              style="background: #e76f51"
              data-color="rgba(231, 111, 81, 0.3)"
              title="Terracotta"
            ></div>
            <div
              class="color-option"
              style="background: #f4a261"
              data-color="rgba(244, 162, 97, 0.3)"
              title="Golden Amber"
            ></div>
            <div
              class="color-option"
              style="background: #264653"
              data-color="rgba(38, 70, 83, 0.3)"
              title="Deep Teal"
            ></div>
            <div
              class="color-option"
              style="background: #8ab4a6"
              data-color="rgba(138, 180, 166, 0.3)"
              title="Sage Green"
            ></div>
            <div
              class="color-option"
              style="background: #9c6b98"
              data-color="rgba(156, 107, 152, 0.3)"
              title="Plum Velvet"
            ></div>
          </div>
        </div>
      </div>
    </section>
